<script>
    const getQueryVariable = (variable) => {
        const query = window.location.search.substring(1);
        const vars = query.split("&");
        for (let i = 0; i < vars.length; i++) {
            const pair = vars[i].split("=");
            if (pair[0] == variable) {
                return pair[1];
            }
        }
        return (false);
    }

    const getVideoURL = () => {
        const link = getQueryVariable("video");
        if (link) {
            return link;
        } else {
            return "https://video.twimg.com/ext_tw_video/1659385473058349057/pu/vid/1280x720/hsuvzNysUc7xDvW1.mp4";
            // Link must be a direct link to a video file!
        }
    }

    const getThumbnailURL = () => {
        const thumbnail = getQueryVariable("image");
        if (thumbnail) {
            return thumbnail;
        } else {
            return "https://media.discordapp.net/attachments/1097367914337816638/1102056308326277180/IMG_20230426_233551.jpg?width=422&height=624";
        }
    }

    // Generate embed
    const videoURL = getVideoURL();
    const thumbnailURL = getThumbnailURL();

    const embed = document.createElement("iframe");
    embed.setAttribute("src", videoURL);
    embed.setAttribute("width", "1280");
    embed.setAttribute("height", "720");
    embed.setAttribute("frameborder", "0");
    embed.setAttribute("allow", "accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture");
    embed.setAttribute("allowfullscreen", "true");
    
    const thumbnail = document.createElement("img");
    thumbnail.setAttribute("src", thumbnailURL);
    thumbnail.setAttribute("alt", "Fortniteburger");

    document.body.appendChild(embed);
    document.body.appendChild(thumbnail);

</script>

<head>
    <!--Now we add our query stuff here,-->
    <!-- get video and image -->
    <meta property="og:image" content="" />
    <meta property="og:type" content="video.other" />
    <meta property="og:video:url" content="" />
    <meta property="og:video:type" content="video/mp4" />
    <meta property="og:video:width" content="1280" />
</head>

<script>
    // set the properties of the video
    ogimage = document.querySelector("meta[property='og:image']");
    ogimage.setAttribute("content", getThumbnailURL());

    ogtype = document.querySelector("meta[property='og:type']");
    ogtype.setAttribute("content", "video.other");

    ogvideourl = document.querySelector("meta[property='og:video:url']");
    ogvideourl.setAttribute("content", getVideoURL());
</script>
